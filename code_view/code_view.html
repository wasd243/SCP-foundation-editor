<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation Editor-LEZER-TEST-1</title>
    <link rel="stylesheet" href="assets/code_view.css">

    <style>
        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #282c34;
            overflow: hidden;
            font-family: var(--p-font-monospace, 'Sarasa Gothic SC', monospace);
        }
        #editor-container {
            width: 100%;
            height: 100%;
            z-index: 1; /* 底层 */
        }
    </style>
    <!-- PyQt script -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
    <input type="checkbox" id="toolbar-toggle" style="display: none;">
    <div id="editor-container"></div>
    <script type="module" src="assets/bundle_editor.js"></script>

    <script>
        // --- QtWebChannel 初始化 ---
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof qt !== 'undefined') {
                new QWebChannel(qt.webChannelTransport, function (channel) {
                    window.pyBridge = channel.objects.py_bridge;
                    console.log("H2O2: Qt 通道联通成功！");
                });
            } else {
                console.warn("H2O2: 未检测到 Qt 环境，处于普通浏览器模式");
            }
        });
        // 定义模板
        const EXAMPLE_CODE = ``;

        // 插入代码逻辑
        window.insertCode = function(before, after = before) {
            const view = window.editorInstance;
            if (!view) return;

            const { state } = view;
            const mainSelection = state.selection.main;
            const from = mainSelection.from;
            const to = mainSelection.to;
            const selectedText = state.sliceDoc(from, to);

            view.dispatch({
                changes: { from, to, insert: before + selectedText + after },
                selection: { anchor: from + before.length + selectedText.length },
                scrollIntoView: true
            });
            view.focus();
        }

        window.handleAction = function(type) {
            const view = window.editorInstance;
            if (!view) {
                console.warn("[Editor] 实例尚未初始化，请稍后...");
                return;
            }

            let contentToInsert = ""; 

            if (type === 'sync') {
                const docContent = view.state.doc.toString(); 
                navigator.clipboard.writeText(docContent).then(() => {
                    const syncBtn = document.querySelector('.btn-sync');
                    const oldText = syncBtn.innerText;
                    syncBtn.innerText = "COPIED!";
                    
                    // 触发闪烁动画（如果有的话）
                    const container = document.getElementById('editor-container');
                    if(container) container.classList.add('syncing');
                    
                    setTimeout(() => { 
                        syncBtn.innerText = oldText; 
                        if(container) container.classList.remove('syncing');
                    }, 2000);
                });
                return; 
            } 
            
            // --- 核心修改部分 ---
            if (type === 'init') {
                // 增加二次确认窗口
                const msg = "此操作将覆盖当前编辑器内的所有内容并加载演示模板，确定吗？";
                if (!confirm(msg)) return; 
                contentToInsert = EXAMPLE_CODE;
            } else if (type === 'clear') {
                if (!confirm("确定要清空所有内容吗？")) return;
                contentToInsert = "";
            }

            // 执行替换
            view.dispatch({
                changes: { from: 0, to: view.state.doc.length, insert: contentToInsert },
                selection: { anchor: 0 } // 初始化后光标回到开头
            });
        };
        // Qt 环境下，等编辑器脚本加载完毕后再初始化编辑器实例
        window.onload = function() {
            const container = document.getElementById('editor-container');
            if (window.startEditor) {
                window.editorInstance = window.startEditor(container);
                console.log("H2O2: 编辑器已挂载到容器");
            } else {
                console.error("H2O2: 找不到 startEditor 函数，请检查 bundle 是否正确导出了该函数");
            }
        }
    </script> 
</body>
</html>
