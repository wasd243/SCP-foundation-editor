<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation Editor-LEZER-TEST-1</title>
    <link rel="stylesheet" href="assets/code_view.css">

    <style>
        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #282c34;
            overflow: hidden;
            font-family: var(--p-font-monospace, 'Sarasa Gothic SC', monospace);
        }
        #editor-container {
            width: 100%;
            height: 100%;
            z-index: 1; /* 底层 */
        }
    </style>
    <!-- PyQt script -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
    <input type="checkbox" id="toolbar-toggle" style="display: none;">
    <div id="editor-container"></div>
    <script type="module" src="assets/bundle_editor.js"></script>

    <script>
        // --- QtWebChannel 初始化 ---
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof qt !== 'undefined') {
                new QWebChannel(qt.webChannelTransport, function (channel) {
                    window.pyBridge = channel.objects.py_bridge;
                    console.log("H2O2: Qt 通道联通成功！");
                });
            } else {
                console.warn("H2O2: 未检测到 Qt 环境，处于普通浏览器模式");
            }
        });

        // 供 Python 或其他地方调用的动作处理
        window.handleAction = function(type) {
            const view = window.editorInstance;
            if (!view) return;
            // 你的原有清空等逻辑可以放这里
        };

        // --- 核心：轮询等待 editor.js 加载完毕 ---
        function bootstrapEditor() {
            const container = document.getElementById('editor-container');
            
            // 检查 editor.js 是不是已经把 startEditor 挂到 window 上了
            if (typeof window.startEditor === 'function') {
                console.log("H2O2: 编辑器引擎就绪，正在初始化...");
                
                // 1. 初始化编辑器
                window.editorInstance = window.startEditor(container);
                
                // 2. 挂载同步函数供 Python 随时调用
                window.syncToEditor = function(code) {
                    if (!window.editorInstance) return;
                    window.editorInstance.dispatch({
                        changes: {
                            from: 0, 
                            to: window.editorInstance.state.doc.length, 
                            insert: code
                        }
                    });
                };

                // 3. 马上把 Python 存在 PENDING_CONTENT 里的 19 个字符塞进去
                if (window.PENDING_CONTENT) {
                    console.log("H2O2: 发现预存内容，立刻注入！");
                    window.syncToEditor(window.PENDING_CONTENT);
                }
            } else {
                // 如果还没加载完，等 50ms 再回来看一眼
                setTimeout(bootstrapEditor, 50);
            }
        }

        // 开始监控启动
        bootstrapEditor();
    </script>
</body>
</html>
