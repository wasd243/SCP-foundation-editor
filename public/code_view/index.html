<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation Editor-LEZER</title>
    <link rel="stylesheet" href="assets/code_view.css">

    <style>
        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #282c34;
            overflow: hidden;
            font-family: var(--p-font-monospace, 'Sarasa Gothic SC', monospace);
        }
        #editor-container {
            width: 100%;
            height: 100%;
            z-index: 1; /* Base layer */
        }
        
        /*----------------------------------sync----------------------------------*/
        .btn-sync {
            color: #00ff00;
            border-color: #00ff00;
            box-shadow: 4px 4px 0px #00ff00;
        }
        .btn-sync:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 2px 2px 0px #00ff00;
        }

        @keyframes sync-flash {
            0% { background-color: rgba(0, 255, 0, 0); }
            50% { background-color: rgba(0, 255, 0, 0.15); }
            100% { background-color: rgba(0, 255, 0, 0); }
        }
        .syncing {
            animation: sync-flash 0.6s ease-in-out;
        }
        /*----------------------------------sync----------------------------------*/

        /* Always-on-top button area */
        .editor-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 9999; /* Ensure topmost layer */
            display: flex;
            gap: 15px;
        }

        .ctrl-btn {
            background: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 6px 14px;
            font-family: var(--p-font-monospace, 'Sarasa Gothic SC', monospace);
            font-size: 12px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #ffffff;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .ctrl-btn:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 2px 2px 0px #ffffff;
            transform: translate(2px, 2px);
        }

        .btn-clear {
            color: #ff4444;
            border-color: #ff4444;
            box-shadow: 4px 4px 0px #ff4444;
        }
        .btn-clear:hover {
            background: #ff4444;
            color: #ffffff;
            box-shadow: 2px 2px 0px #ff4444;
        }

        /*----------------------------------top toolbar---------------------------------*/
        /* Initial state: collapsed */
        .quick-toolbar {
            position: relative;
            background: #000;
            border-bottom: 2px solid #fff;
            display: flex;
            gap: 10px;
            padding: 0 10px; 
            max-height: 0;   
            overflow: hidden; /* Ensure buttons are fully hidden when collapsed */
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s;
            z-index: 100;
        }

        /* Label initial state: centered hover */
        .toolbar-label {
            position: absolute;
            top: 0; 
            left: 50%; /* Accurate centering: anchor to viewport center */
            transform: translateX(-50%); /* Pull back by half width for absolute centering */
            background: #fff;
            color: #000;
            padding: 2px 12px;
            cursor: pointer;
            z-index: 101; 
            border: 2px solid #000;
            border-top: none;
            font-size: 11px;
            font-weight: bold;
            /* Use the same smooth transition as toolbar */
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* 1. When toggled on, expand toolbar */
        #toolbar-toggle:checked ~ .quick-toolbar {
            max-height: 150px; 
            padding: 10px;    
        }

        /* 2. When toggled on, move label downward */
        #toolbar-toggle:checked ~ .toolbar-label {
            /* Keep centered while shifting down 43px (~expanded toolbar height) */
            transform: translate(-50%, 43px); 
        }
        
        .toolbar-group {
            display: flex;
            gap: 5px;
        }

        .tool-btn {
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            padding: 4px 12px;
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: #fff;
            color: #000;
        }
        /*----------------------------------top toolbar---------------------------------*/

    </style>
</head>
<body>

    <div class="editor-controls">
        <button class="ctrl-btn btn-sync" onclick="handleAction('sync')">SYNC</button>
        <button class="ctrl-btn btn-init" onclick="handleAction('init')">INIT</button>
        <button class="ctrl-btn btn-clear" onclick="handleAction('clear')">CLEAR</button>
    </div>

    <!------------------------------------------------tool area---------------------------------------------->
    <input type="checkbox" id="toolbar-toggle" style="display: none;">

    <label for="toolbar-toggle" class="toolbar-label">CODE TOOLS</label>

    <div class="quick-toolbar">
        <div class="toolbar-group">
            <button class="tool-btn" onclick="insertCode('**')">B</button>
            <button class="tool-btn" onclick="insertCode('//')">I</button>
            <button class="tool-btn" onclick="insertCode('__')">U</button>
            <button class="tool-btn" onclick="insertCode('--')">S</button>
            <button class="tool-btn" onclick="insertCode('{{', '}}')">tt</button>
            <button class="tool-btn" onclick="insertCode('^^')">X^2</button>
            <button class="tool-btn" onclick="insertCode(',,')">X,2</button>
            <button class="tool-btn" onclick="insertCode('@@')">@@</button>
        </div>
    </div>
    <div id="editor-container"></div>
    <!------------------------------------------------tool area---------------------------------------------->
    <script type="module" src="assets/bundle_editor.js"></script>

    <script>
        // Define template
        const EXAMPLE_CODE = ``;

        // Code insertion logic
        function insertCode(before, after = before) {
            const view = window.editorInstance;
            if (!view) return;

            const { state } = view;
            const mainSelection = state.selection.main;
            const from = mainSelection.from;
            const to = mainSelection.to;
            const selectedText = state.sliceDoc(from, to);

            view.dispatch({
                changes: { from, to, insert: before + selectedText + after },
                selection: { anchor: from + before.length + selectedText.length },
                scrollIntoView: true
            });
            view.focus();
        }

        window.handleAction = function(type) {
            const view = window.editorInstance;
            if (!view) {
                console.warn("[Editor] Instance is not initialized yet, please wait...");
                return;
            }

            let contentToInsert = ""; 

            if (type === 'sync') {
                const docContent = view.state.doc.toString(); 
                navigator.clipboard.writeText(docContent).then(() => {
                    const syncBtn = document.querySelector('.btn-sync');
                    const oldText = syncBtn.innerText;
                    syncBtn.innerText = "COPIED!";
                    
                    // Trigger flash animation (if available)
                    const container = document.getElementById('editor-container');
                    if(container) container.classList.add('syncing');
                    
                    setTimeout(() => { 
                        syncBtn.innerText = oldText; 
                        if(container) container.classList.remove('syncing');
                    }, 2000);
                });
                return; 
            }
            
            // --- Core update section ---
            if (type === 'init') {
                // Add confirmation dialog
                const msg = "This action will overwrite all current content and load the demo template. Continue?";
                if (!confirm(msg)) return; 
                contentToInsert = EXAMPLE_CODE;
            } else if (type === 'clear') {
                if (!confirm("Are you sure you want to clear all content?")) return;
                contentToInsert = "";
            }

            // Perform replacement
            view.dispatch({
                changes: { from: 0, to: view.state.doc.length, insert: contentToInsert },
                selection: { anchor: 0 } // Move cursor to start after initialization
            });
        }
    </script> 
</body>
</html>
