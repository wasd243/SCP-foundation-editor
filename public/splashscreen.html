<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SCP-WYSIWYG</title>
        <style>
            :root {
                --void: #0d0f12;
                --paper: #e8e6df;
                --steel: #8a929c;
                --hazard: #d23b2e;
                --line: #2a2f36;
                --mono:
                    ui-monospace, "Cascadia Code", "Consolas", "Courier New",
                    monospace;
            }

            html,
            body {
                /* Required so the rounded card floats over the desktop. */
                background: transparent;
                margin: 0;
                height: 100%;
            }

            body {
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                font-family: var(--mono);
                cursor: default;
                user-select: none;
                -webkit-user-select: none;
            }

            .card {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 18px;

                width: 360px;
                height: 260px;
                box-sizing: border-box;
                padding: 30px 28px;

                background: rgba(13, 15, 18, 0.95);
                border: 1px solid var(--line);
                border-radius: 12px;
                box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);

                animation: rise 0.45s ease-out both;
            }

            /* Eyebrow: the real SCP motto — it also names what the mark means. */
            .motto {
                margin: 0;
                color: var(--steel);
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 3.5px;
                text-transform: uppercase;
            }

            .title {
                margin: 0;
                color: var(--paper);
                font-size: 22px;
                font-weight: 700;
                letter-spacing: 4px;
            }

            .status {
                margin: 0;
                color: var(--steel);
                font-size: 11px;
                letter-spacing: 1px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            @keyframes pulse {
                0%,
                100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.08);
                }
            }

            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(6px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .card {
                    animation: none;
                }
            }
        </style>
    </head>
    <body>
        <div class="card" role="status" aria-label="Starting SCP-WYSIWYG">
            <p class="motto">Secure · Contain · Protect</p>

            <img src="pataphysics.svg" alt="logo" width="120" height="120" />

            <h1 class="title">SCP-WYSIWYG</h1>
            <p class="status">Initializing editor&hellip;</p>
        </div>
    </body>
</html>
