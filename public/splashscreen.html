<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SCP-WYSIWYG</title>
        <style>
            :root {
                --void: #0d0f12;
                --paper: #e8e6df;
                --steel: #8a929c;
                --hazard: #d23b2e;
                --line: #2a2f36;
                --mono: ui-monospace, "Cascadia Code", "Consolas",
                    "Courier New", monospace;
            }

            html,
            body {
                /* Required so the rounded card floats over the desktop. */
                background: transparent;
                margin: 0;
                height: 100%;
            }

            body {
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                font-family: var(--mono);
                cursor: default;
                user-select: none;
                -webkit-user-select: none;
            }

            .card {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 18px;

                width: 360px;
                height: 260px;
                box-sizing: border-box;
                padding: 30px 28px;

                background: rgba(13, 15, 18, 0.95);
                border: 1px solid var(--line);
                border-radius: 12px;
                box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);

                animation: rise 0.45s ease-out both;
            }

            /* Eyebrow: the real SCP motto — it also names what the mark means. */
            .motto {
                margin: 0;
                color: var(--steel);
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 3.5px;
                text-transform: uppercase;
            }

            /* --- Signature: the containment mark (three inward arrows) --- */
            .mark {
                flex: 0 0 auto;
                margin-top: 6px;
                animation: pulse 2.2s ease-in-out infinite;
            }

            .mark__spin {
                position: relative;
                width: 80px;
                height: 80px;
                animation: spin 4s linear infinite;
            }

            .arrow {
                position: absolute;
                top: 0;
                left: 50%;
                width: 0;
                height: 0;
                margin-left: -13px;
                border-left: 13px solid transparent;
                border-right: 13px solid transparent;
                border-top: 20px solid var(--hazard);
                /* Rotate each arrow about the centre of the 80px box. */
                transform-origin: 13px 40px;
            }

            .arrow:nth-child(1) {
                transform: rotate(0deg);
            }
            .arrow:nth-child(2) {
                transform: rotate(120deg);
            }
            .arrow:nth-child(3) {
                transform: rotate(240deg);
            }

            .title {
                margin: 0;
                color: var(--paper);
                font-size: 22px;
                font-weight: 700;
                letter-spacing: 4px;
            }

            .status {
                margin: 0;
                color: var(--steel);
                font-size: 11px;
                letter-spacing: 1px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            @keyframes pulse {
                0%,
                100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.08);
                }
            }

            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(6px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .card,
                .mark,
                .mark__spin {
                    animation: none;
                }
            }
        </style>
    </head>
    <body>
        <div class="card" role="status" aria-label="Starting SCP-WYSIWYG">
            <p class="motto">Secure · Contain · Protect</p>

            <div class="mark" aria-hidden="true">
                <div class="mark__spin">
                    <span class="arrow"></span>
                    <span class="arrow"></span>
                    <span class="arrow"></span>
                </div>
            </div>

            <h1 class="title">SCP-WYSIWYG</h1>
            <p class="status">Initializing editor&hellip;</p>
        </div>
    </body>
</html>
