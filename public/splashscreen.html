<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SCP-WYSIWYG</title>
        <style>
            :root {
                --void: #0d0f12;
                --paper: #e8e6df;
                --steel: #8a929c;
                --hazard: #d23b2e;
                --line: #2a2f36;
                --mono:
                    ui-monospace, "Cascadia Code", "Consolas", "Courier New",
                    monospace;
            }

            html,
            body {
                /* Required so the rounded card floats over the desktop. */
                background: transparent;
                margin: 0;
                height: 100%;
            }

            body {
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                font-family: var(--mono);
                /* Clickable only once the editor is ready (body.ready). */
                cursor: default;
                user-select: none;
                -webkit-user-select: none;
            }

            .card {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 18px;

                width: 360px;
                height: 260px;
                box-sizing: border-box;
                padding: 30px 28px;

                background: rgba(13, 15, 18, 0.95);
                border: 1px solid var(--line);
                border-radius: 12px;
                box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);

                animation: rise 0.45s ease-out both;
            }

            /* Eyebrow: the real SCP motto — it also names what the mark means. */
            .motto {
                margin: 0;
                color: var(--steel);
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 3.5px;
                text-transform: uppercase;
            }

            .title {
                margin: 0;
                color: var(--paper);
                font-size: 22px;
                font-weight: 700;
                letter-spacing: 4px;
            }

            .status {
                margin: 0;
                color: var(--steel);
                font-size: 11px;
                letter-spacing: 1px;
            }

            /* Subtle affordance: tells the user the splash can be clicked.
               Hidden until the editor is ready, where it replaces the status
               line so the fixed-height card never overflows. */
            .hint {
                display: none;
                margin: 0;
                color: var(--steel);
                opacity: 0.6;
                font-size: 10px;
                letter-spacing: 2px;
                text-transform: uppercase;
                animation: hint-fade 2.2s ease-in-out infinite;
            }

            /* Once ready: enable the click affordance and swap status -> hint. */
            body.ready {
                cursor: pointer;
            }

            body.ready .status {
                display: none;
            }

            body.ready .hint {
                display: block;
            }

            @keyframes hint-fade {
                0%,
                100% {
                    opacity: 0.35;
                }
                50% {
                    opacity: 0.7;
                }
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            @keyframes pulse {
                0%,
                100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.08);
                }
            }

            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(6px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .card,
                .hint {
                    animation: none;
                }
            }
        </style>
    </head>
    <body>
        <div class="card" role="status" aria-label="Starting SCP-WYSIWYG">
            <p class="motto">Secure · Contain · Protect</p>

            <img src="pataphysics.svg" alt="logo" width="120" height="120" />

            <h1 class="title">SCP-WYSIWYG</h1>
            <p class="status">Initializing editor&hellip;</p>
            <p class="hint">Click to continue</p>
        </div>

        <script>
            // The splash owns the dismissal. On the happy path it waits for the
            // main window to report it is ready ("main-ready"), then enables a
            // click affordance and a 5s auto-close. But the main window starts
            // hidden, and on macOS a hidden WebView has its display-link/timers
            // suspended — so "main-ready" can be late or never arrive. The splash
            // itself is always visible, so its own timer is reliable: an
            // independent fallback force-dismisses after a hard ceiling,
            // guaranteeing the main window is revealed even if the signal never
            // comes. The backend `close_splashscreen` is the run-once guard.
            const FALLBACK_MS = 10000;

            let ready = false;
            let dismissed = false;

            function dismiss() {
                if (dismissed) return;
                dismissed = true;
                // `window.__TAURI__` is injected by withGlobalTauri; accessed
                // lazily here (not at top level) so it is reliably defined.
                try {
                    window.__TAURI__?.core?.invoke("close_splashscreen");
                } catch (e) {
                    console.warn("Could not close splashscreen:", e);
                }
            }

            // Wait for the global to be injected before wiring Tauri APIs.
            window.addEventListener("DOMContentLoaded", () => {
                // Click to skip the wait — inert until the editor reports ready.
                document.addEventListener("click", () => {
                    if (ready) dismiss();
                });

                // From the moment the main window is ready: reveal the click
                // hint, enable the pointer cursor, and start the 5s auto-close.
                try {
                    window.__TAURI__?.event?.listen("main-ready", () => {
                        ready = true;
                        document.body.classList.add("ready");
                        setTimeout(dismiss, 5000);
                    });
                } catch (e) {
                    console.warn("Could not listen for main-ready:", e);
                }

                // macOS safety net (see note above): force the reveal after a
                // hard ceiling even if "main-ready" never arrives, so the user
                // is never stranded on the splash. This timer runs in the
                // visible splash window, so unlike the fallback in main.ts it is
                // not throttled by a hidden WebView.
                setTimeout(dismiss, FALLBACK_MS);
            });
        </script>
    </body>
</html>
