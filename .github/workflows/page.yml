name: Deploy Pages

on:
  push:
    branches: [main, demo]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref_name }}"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/configure-pages@v6

      - name: Stage site
        run: |
          mkdir -p _site
          if [ "${{ github.ref_name }}" = "demo" ]; then
            mkdir -p _site/demo
            cp -r docs/page/. _site/demo/
          else
            cp -r docs/page/. _site/
          fi

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
