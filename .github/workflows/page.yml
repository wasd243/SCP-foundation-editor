name: Deploy Pages

on:
  push:
    branches: [demo]          # 只发 demo,main 不参与
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/page       # 根=docs/page,里面有 index.html + demo/index.html
      - id: deployment
        uses: actions/deploy-pages@v5
