name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin
          python -m pip install pyinstaller
          python -m pip install -r requirements.txt

      - name: Build Rust module
        working-directory: engine/rust_engine/ftml_py
        run: python -m maturin build --release

      - name: Check generated wheels
        working-directory: engine/rust_engine/ftml_py
        run: dir target/wheels
        if: runner.os == 'Windows'

      - name: Install Rust wheel (Windows)
        if: runner.os == 'Windows'
        working-directory: engine/rust_engine/ftml_py
        run: |
          $wheel = Get-ChildItem target/wheels/*.whl | Select-Object -First 1
          if (-not $wheel) {
            Write-Error "Wheel file not found!"
            exit 1
          }
          python -m pip install $wheel.FullName

      - name: Install Rust wheel (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: engine/rust_engine/ftml_py
        run: |
          WHEEL=$(ls target/wheels/*.whl | head -n 1)
          if [ -z "$WHEEL" ]; then
            echo "Wheel file not found!"
            exit 1
          fi
          python -m pip install "$WHEEL"

      - name: Build EXE (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller Main.py --noconsole `
          --hidden-import ftml_parser `
          --hidden-import ftml_py `
          --add-data "engine;engine" `
          --add-data "ui;ui" `
          --add-data "utils;utils" `
          --add-data "controllers;controllers" `
          --add-data "formats;formats"

      - name: Build App (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller Main.py --noconsole \
          --hidden-import ftml_parser \
          --hidden-import ftml_py \
          --add-data "engine:engine" \
          --add-data "ui:ui" \
          --add-data "utils:utils" \
          --add-data "controllers:controllers" \
          --add-data "formats:formats"

      - name: Zip build (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist/Main/* -DestinationPath scp-editor-windows.zip

      - name: Zip build (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist/Main
          zip -r ../../scp-editor-linux.zip *

      - name: Zip build (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist/Main
          zip -r ../../scp-editor-macos.zip *

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scp-editor-windows.zip
            scp-editor-linux.zip
            scp-editor-macos.zip
