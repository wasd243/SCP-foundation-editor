name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Install Python deps
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pyinstaller
          pip install -r requirements.txt

      # Build Rust wheel
      - name: Build Rust module
        working-directory: engine/rust_engine/ftml_py
        run: |
          python -m maturin build --release

      # Install wheel (Windows)
      - name: Install Rust wheel (Windows)
        if: runner.os == 'Windows'
        working-directory: engine/rust_engine/ftml_py
        shell: pwsh
        run: |
          $wheel = Get-ChildItem target/wheels/*.whl | Select-Object -First 1
          if (-not $wheel) {
            Write-Error "Wheel file not found!"
            exit 1
          }
          python -m pip install $wheel.FullName

      # Install wheel (Linux/macOS)
      - name: Install Rust wheel (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: engine/rust_engine/ftml_py
        run: |
          WHEEL=$(ls target/wheels/*.whl | head -n 1)
          if [ -z "$WHEEL" ]; then
            echo "Wheel file not found!"
            exit 1
          fi
          python -m pip install "$WHEEL"

      # Verify Rust module loads
      - name: Verify Rust module
        run: |
          python -c "import ftml_py; print('Rust module loaded successfully')"

      # Build application using spec file
      - name: Build application
        run: |
          pyinstaller SCPEditor.spec

      # Show dist contents (debug)
      - name: List dist folder
        run: |
          ls dist
        if: runner.os != 'Windows'

      - name: List dist folder (Windows)
        if: runner.os == 'Windows'
        run: |
          dir dist

      # Zip Windows build
      - name: Zip build (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist/SCPEditor/* -DestinationPath scp-editor-windows.zip

      # Zip Linux build
      - name: Zip build (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist/SCPEditor
          zip -r ../../scp-editor-linux.zip *

      # Zip macOS build
      - name: Zip build (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist/SCPEditor
          zip -r ../../scp-editor-macos.zip *

      # Upload artifact (debug / backup)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scp-editor-${{ matrix.os }}
          path: |
            scp-editor-windows.zip
            scp-editor-linux.zip
            scp-editor-macos.zip
          if-no-files-found: ignore

      # Publish GitHub Release
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scp-editor-windows.zip
            scp-editor-linux.zip
            scp-editor-macos.zip
