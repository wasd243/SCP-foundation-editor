name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux system deps (Qt WebEngine)
      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxcb-xinerama0

      # Install Python deps
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pyinstaller
          pip install -r requirements.txt

      # Build Rust wheel
      - name: Build Rust module
        working-directory: engine/rust_engine/ftml_py
        run: |
          python -m maturin build --release

      # Install wheel
      - name: Install Rust wheel
        working-directory: engine/rust_engine/ftml_py
        run: |
          python -m pip install target/wheels/*.whl

      # Verify Rust module
      - name: Verify Rust module
        run: |
          python -c "import ftml_py; print('Rust module loaded successfully')"

      # Build application (ONEFILE)
      - name: Build application
        run: |
          pyinstaller SCPEditor.spec

      # Debug dist
      - name: Show dist contents
        run: |
          ls dist || dir dist

      # Package Windows
      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist/SCPEditor.exe -DestinationPath scp-editor-windows.zip

      # Package Linux
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd dist
          zip ../scp-editor-linux.zip SCPEditor

      # Package macOS
      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip ../scp-editor-macos.zip SCPEditor

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scp-editor-${{ matrix.os }}
          path: |
            scp-editor-windows.zip
            scp-editor-linux.zip
            scp-editor-macos.zip
          if-no-files-found: ignore

      # Publish GitHub Release
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scp-editor-windows.zip
            scp-editor-linux.zip
            scp-editor-macos.zip
