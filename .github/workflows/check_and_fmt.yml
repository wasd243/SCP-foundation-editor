name: Check and Format

on: [push]

jobs:
  check-and-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check and fmt ltmf
        working-directory: crates/ltmf
        run: |
          cargo check
          cargo fmt

      - name: Check and fmt w_parser
        working-directory: crates/w_parser
        run: |
          cargo check
          cargo fmt

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Check and fmt src-tauri
        working-directory: src-tauri
        run: |
          cargo check
          cargo fmt
