name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Needed for tauri-action to create/upload GitHub Releases on tag pushes.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            public/code_view/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS binary needs both arch targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      # The Code View bundle (assets/bundle_editor.js) is gitignored, but
      # index.html loads it and Vite copies public/ into dist/. Build it here
      # so the packaged app ships a working code view. parser.js is committed,
      # so `node build` (bundle only) is sufficient — no lezer-generator needed.
      - name: Build Code View bundle
        run: npm ci && node build
        working-directory: public/code_view

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing. With `createUpdaterArtifacts` set in
          # tauri.conf.json, these make tauri-action sign the bundles and emit
          # `latest.json` (+ `.sig` files) onto the release for the updater to
          # consume. The public half lives in tauri.conf.json `plugins.updater`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # On a tag push, create a draft pre-release with the installers.
          # On workflow_dispatch there is no tag, so tagName is empty and
          # tauri-action only builds (no release) — see the upload step below.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "SCP-WYSIWYG ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

      # Manual (workflow_dispatch) runs: no release is created, so expose the
      # built installers as downloadable run artifacts instead. The workspace
      # Cargo.toml at the repo root puts the bundle under repo-root target/;
      # the universal-apple-darwin leg nests under its own target triple.
      - name: Upload build artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: scp-wysiwyg-${{ matrix.platform }}
          path: |
            target/release/bundle/**
            target/universal-apple-darwin/release/bundle/**
          if-no-files-found: error

  # GitHub's `/releases/latest/` only resolves to non-prerelease releases, so a
  # beta/rc would never be discovered there. Instead, publish the cross-platform
  # `latest.json` (which tauri-action merged onto the release across the build
  # matrix) into the Pages source `docs/page/`. Committing it triggers the
  # "Deploy Pages" workflow, which serves it at the updater endpoint configured
  # in tauri.conf.json — and that path includes prereleases.
  publish-updater-manifest:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Fetch latest.json from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "latest.json" \
            --dir docs/page --clobber

      - name: Commit manifest to Pages source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/page/latest.json
          if git diff --cached --quiet; then
            echo "latest.json unchanged — nothing to publish"
          else
            git commit -m "chore(updater): publish ${{ github.ref_name }} manifest"
            git push origin main
          fi
