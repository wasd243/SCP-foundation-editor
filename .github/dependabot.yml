version: 2
updates:
  # Frontend
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Code View subproject
  - package-ecosystem: "npm"
    directory: "/public/code_view"
    schedule:
      interval: "weekly"

  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
