# The main wikidot -> HTML parser based on ftml

[package]
name = "w_parser"
version.workspace = true
edition.workspace = true

[lib]
name = "w_parser"
crate-type = ["rlib", "cdylib"]

[dependencies]
ftml = { git = "https://github.com/scpwiki/ftml", tag = "v1.40.0" }
kuchiki = "0.8"
time = "=0.3.37"
serde = { version = "1.0.228", features = ["derive"] }
serde_json.workspace = true
regex.workspace = true
